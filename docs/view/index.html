# Arima Notebooks

> **Interactive Java notebooks in your browser — powered by JShell, Spring Boot, and Claude AI**

Arima Notebooks is a **locally-hosted, browser-based notebook environment for Java developers** — like Jupyter, but built for the JVM. Write and run Java, JShell, and JavaScript cells side by side, manage Maven and npm dependencies, chain cells with pipeline orchestration, and get AI assistance from Claude — all without leaving your browser.

No cloud account. No data sent anywhere. Runs entirely on your machine.

---

## Why Arima?

Java developers have always been second-class citizens in the notebook world. Jupyter supports Python natively; everything else is a plugin or a workaround. Arima was built from the ground up for Java:

- **JShell-native** — the official Java REPL, not a workaround
- **Full class compilation** — switch any cell to full `javac` compile+run mode
- **Maven built in** — install any Maven Central package in seconds; it's immediately on the classpath
- **Real JVM** — no sandboxing, no limitations — it's your JDK
- **JavaScript too** — Node.js cells for when you need it
- **AI in the loop** — Claude generates, explains, and debugs code inline
- **Offline by default** — your notebooks and code never leave your machine

---

## Features at a Glance

| Feature | Description |
|---------|-------------|
| **Three execution modes** | JShell snippets · Full Java compile/run · Node.js JavaScript |
| **Real-time output** | Console output streams live via WebSocket |
| **Maven Package Manager** | Install/uninstall Maven packages; auto-injected into JShell classpath |
| **npm Package Manager** | Install npm packages for JavaScript cells with one click |
| **Pipeline Orchestration** | Chain cells with `//@ depends:` annotations and run in dependency order |
| **AI Assistant** | Generate code, explain snippets, create entire notebooks with Claude |
| **Built-in Data Science** | XChart · Commons Math · Tablesaw — pre-installed |
| **Tutorial Library** | 16 built-in tutorials across JShell, Java, and JavaScript |
| **Interactive Console** | Full REPL console with tab completion for all three runtimes |
| **Dark theme** | Easy on the eyes by default |

---

## Requirements

| Requirement | Version | Notes |
|-------------|---------|-------|
| **Java JDK** | 17+ (21 recommended) | Must be a JDK — not just JRE |
| **Maven** | 3.8+ | For building from source |
| **Node.js** | 18+ | Optional — only needed for JavaScript cells |
| **Claude CLI** | Latest | Required for AI features (`claude auth`) |

---

## Quick Start

### Step 1 — Clone

```bash
git clone https://github.com/snchande/Venus.git
cd Arima
```

### Step 2 — Start

**Windows:** `arima`

**Unix/Mac:** `./scripts/start.sh`

**Maven:** `mvn spring-boot:run`

### Step 3 — Open

Navigate to **http://localhost:8585**

### Step 4 — Enable AI

Install Claude Code from [claude.ai/code](https://claude.ai/code) and run `claude auth` in a terminal. Arima uses the local Claude CLI — no API key needed.

<script type="text/plain" id="src-contributing">
# Contributing to Arima Notebooks

Thank you for your interest in contributing to Arima Notebooks.

---

## Why Contribute?

Arima Notebooks fills a real gap: **Java developers have never had a first-class notebook environment**. By contributing, you help Java developers learn, explore, and prototype faster.

---

## What You Can Contribute

| Type | Examples |
|------|---------|
| **Bug fixes** | Fix a JShell error message, fix a UI layout issue |
| **New features** | New cell type, new execution engine, new export format |
| **Tutorials** | New `.vnb` tutorial notebooks for the built-in library |
| **Documentation** | Improve setup guides, fix typos |
| **UI/UX** | Improve the dark theme, add keyboard shortcuts |
| **Testing** | Add unit tests, integration tests |

---

## Development Setup

### Prerequisites

| Tool | Version |
|------|---------|
| Git | Any |
| Java JDK | 17–21 |
| Maven | 3.8+ |
| Node.js | 18+ (optional) |

### Build and Run

```bash
mvn clean package -DskipTests
mvn spring-boot:run
# Open http://localhost:8585
```

---

## Coding Standards

### Java

- **No Lombok** — all models use plain Java getters/setters with a manual static `Builder` inner class
- Spring Boot conventions: `@RestController`, `@Service`, constructor injection
- Keep controllers thin — business logic belongs in services

### Frontend

- **No build step** — pure HTML/CSS/JavaScript served statically
- No npm for frontend, no webpack, no TypeScript — vanilla JS only
- All frontend code lives in `src/main/resources/static/`

### Commit Messages (Conventional Commits)

```
feat(cell): add R language cell execution mode
fix(jshell): handle null output from incomplete snippets
docs(tutorials): add java-701 concurrency tutorial
```

---

## Making Changes

### For a Bug Fix

1. Check existing issues — it may already be reported
2. Create a branch: `git checkout -b fix/describe-the-bug`
3. Fix it, test it manually
4. Open a PR referencing the issue

### For a New Feature

1. **Open a Discussion or Issue first** — describe what you want to build
2. Wait for feedback before writing code
3. Create a branch: `git checkout -b feature/describe-the-feature`
4. Open a PR with a clear description

---

## Pull Request Checklist

- [ ] Branch is up to date with `main`
- [ ] Builds cleanly: `mvn clean package -DskipTests`
- [ ] Tested manually against a running server
- [ ] New endpoints documented in `docs/API.md`
- [ ] `CHANGELOG.md` updated under `[Unreleased]`

---

## Community Guidelines

Be respectful. This project follows the [Contributor Covenant Code of Conduct](../../CODE_OF_CONDUCT.md).

Open a [GitHub Discussion](../../discussions) for ideas and questions. Issues are for actionable bugs and confirmed feature requests.
</script>

<script type="text/plain" id="src-maintainer">
# Arima Notebooks — Maintainer Guide

This document covers the maintainer hierarchy, responsibilities, review process, release process, and community management.

---

## Maintainer Hierarchy

### Founding Maintainer

Holds final authority over:
- What gets merged into `main`
- Project direction and roadmap
- Co-maintainer nominations
- Release versioning and timing
- Breaking changes to notebook format or API

### Co-Maintainers

Can:
- Review and approve pull requests
- Merge non-controversial PRs (docs, bug fixes)
- Triage issues and close duplicates
- Help onboard new contributors

Cannot merge unilaterally:
- Breaking changes
- New features without Founding Maintainer approval
- Changes to project governance
- Changes to `.vnb` format or core execution engines

---

## Current Maintainers

| Role | GitHub | Responsibilities |
|------|--------|-----------------|
| **Founding Maintainer** | @snchande | Final merge authority · Roadmap · Releases |

---

## Becoming a Co-Maintainer

Co-maintainership is **by invitation only**. The Founding Maintainer looks for:

- Quality PRs — focused, well-tested, minimal back-and-forth
- Good judgment in discussions — constructive, respectful, technically sound
- Understanding the project philosophy (local-first, no build step, JVM-native)
- Reliability over time, not a single sprint

Do not ask to be made a maintainer. Contribute consistently and the Founding Maintainer will reach out.

---

## Reviewing Pull Requests

Check:
1. **Scope** — one focused thing, not mixed changes
2. **Correctness** — solves the stated problem
3. **Code quality** — follows conventions (no Lombok, constructor injection)
4. **Docs** — updated if behavior changed
5. **Merge safety** — won't break existing notebooks or API contract

**Merge strategy:** Squash merge only. Commit message in Conventional Commits format.

---

## Release Process (Founding Maintainer only)

1. Update `CHANGELOG.md` — move `[Unreleased]` to new versioned section
2. Bump version in `pom.xml` (remove `-SNAPSHOT`)
3. `git tag -a v1.x.0 -m "Release v1.x.0"`
4. `git push origin main --tags`
5. Create a GitHub Release — attach the JAR
6. Re-add `-SNAPSHOT` for next development cycle

---

## Community Management

- **Respond to every first-time contributor** — even just "thanks, reviewing now"
- **Say no kindly** — provide a reason, even a brief one
- **Celebrate contributions** — mention contributors by name in release notes

### Handling Difficult Interactions

1. First offense — respond calmly, point to Code of Conduct
2. Second offense — formal warning
3. Third offense / serious first — block the user (loop in Founding Maintainer first if you're a co-maintainer)

---

## Branch Protection Rules

Require for `main`:
- Pull request before merging
- At least 1 approval
- Dismiss stale reviews on new commits
- No bypassing (even admins)
</script>

<script type="text/plain" id="src-usage">
# Arima Notebooks — Usage Guide

## Starting Arima (Windows CLI)

```cmd
arima               # start server + open browser
arima start --bg    # start in background
arima stop          # stop the server
arima status        # check if running
arima help          # full command reference
```

---

## The Interface

| Tab | Purpose |
|-----|---------|
| **Notebook** | Write and execute Java or JavaScript code in cells |
| **Console** | Multi-runtime REPL — JShell, Java, or JavaScript |
| **Packages** | Install Maven packages (Java) and npm packages (JavaScript) |
| **Settings** | Configure preferences |
| **AI** | Chat with Claude, generate notebooks |

---

## Notebook Tab

### Cell Types

| Type | Border | Badge | Purpose |
|------|--------|-------|---------|
| **JShell** | Indigo | `◈ JShell` | Java snippets with shared session state |
| **Java** | Teal | `◈ Java` | Full class compile-and-run, isolated per cell |
| **JavaScript** | Green | `◈ JS` | Node.js execution, isolated per cell |
| **Markdown** | Amber | `✎ Markdown` | Documentation text rendered as HTML |
| **Pipeline** | Gold | `⬡ Pipeline` | Orchestrate other cells with dependency steps |

### Running Cells

- **Single cell**: Click **Run** or press `Shift+Enter`
- **All cells**: Click **Run All** in the toolbar
- **With dependencies**: Click **Run ↓** to run the cell plus its dependency chain

### Keyboard Shortcuts

| Key | Action |
|-----|--------|
| `Shift+Enter` | Run cell |
| `Ctrl+Enter` | Run cell (alternative) |
| `Ctrl+S` | Save notebook |

---

## Step Navigator

Click the **Step** button (▶) in the toolbar to walk through cells one by one.

| Button | Action |
|--------|--------|
| **◀ Prev** | Previous cell |
| **▷ Run & Next** | Execute and advance |
| **✕** | Exit step mode |

---

## Pipeline Cells

```java
//@ anchor: loadData
//@ description: Load the raw CSV file
//@ depends: validateConfig

Table data = BaristaDisplay.loadCsv("data/sales.csv");
```

| Annotation | Purpose |
|-----------|---------|
| `anchor:` | Unique name for this cell |
| `depends:` | Comma-separated list of required anchors |
| `description:` | Human-readable label |
| `on-error:` | `stop` (default) or `continue` |
| `pipeline:` | Name for a pipeline cell |
| `steps:` | Ordered anchor list |

---

## Data Science Stack

Pre-loaded in every JShell session — no install required.

| Library | Version | Purpose |
|---------|---------|---------|
| **XChart** | 3.8.6 | Charts (XY, bar, pie) |
| **Commons Math** | 3.6.1 | Statistics, regression, distributions |
| **Tablesaw** | 0.43.1 | DataFrame (load, filter, groupBy) |
| **OpenCSV** | 5.9 | CSV parsing |

### Charts

```java
var chart = BaristaDisplay.xyChart("Title", "X", "Y");
chart.addSeries("sin(x)", xData, yData);
BaristaDisplay.show(chart);
```

### DataFrames

```java
Table df = BaristaDisplay.loadCsv("data/sales.csv");
BaristaDisplay.show(df);          // full table
BaristaDisplay.describe(df);      // statistics
```

---

## Console Tab

| Button | Runtime |
|--------|---------|
| `☕ JShell` | Java snippets, shared state |
| `♨ Java` | Full Java class per command |
| `⬡ JavaScript` | Node.js REPL |

Press **Tab** for auto-complete. Use **↑/↓** for history.

---

## Packages Tab

### Maven (Java)

Enter `groupId:artifactId:version` and click **Install**.

```
com.google.code.gson:gson:2.10.1
org.apache.commons:commons-lang3:3.14.0
```

### npm (JavaScript)

Enter a package name and click **Install**.

```
simple-statistics
mathjs
lodash
```

---

## AI Assistant Tab

1. Go to the **AI** tab
2. Type your question
3. Press **Enter** or click **Send**

Click **Generate Notebook** to have Claude create a complete notebook from a description.

AI requires the Claude CLI to be installed and authenticated (`claude auth`).
</script>

# Arima Notebooks — Setup Guide

## Prerequisites

| Requirement | Minimum | Recommended |
|-------------|---------|-------------|
| Java JDK | 17 | 21 (LTS) |
| Maven | 3.8 | 3.9+ |

> **Important**: You need a full **JDK**, not just a JRE. JShell is a JDK tool.
> Verify with: `javac -version`

### Optional

| Requirement | Purpose |
|-------------|---------|
| Node.js 18 LTS | JavaScript cells |
| Claude CLI | AI Assistant features |

---

## Installation

### Step 1: Get the code

```bash
git clone https://github.com/snchande/Venus.git
cd Arima
```

### Step 2: Verify Java

```bash
java -version
javac -version
# Both should show 17+ or higher
```

### Step 3: Build

```bash
mvn clean package -DskipTests
```

### Step 4: Run

**Windows (recommended):**
```cmd
arima
```

**Unix/Mac:**
```bash
./scripts/start.sh
```

**Maven dev mode:**
```bash
mvn spring-boot:run
```

**JAR directly:**
```bash
java \
  --add-opens=jdk.jshell/jdk.jshell=ALL-UNNAMED \
  --add-opens=java.base/java.lang=ALL-UNNAMED \
  --add-exports=jdk.jshell/jdk.jshell=ALL-UNNAMED \
  -jar target/arima-notebooks-1.0.0-SNAPSHOT.jar
```

### Step 5: Open Browser

Navigate to: **http://localhost:8585**

---

## Claude AI Setup

Arima uses the local **Claude CLI** — no API key required.

1. Install Claude Code: [claude.ai/code](https://claude.ai/code)
2. Authenticate: run `claude auth` in a terminal
3. Start Arima — AI features work automatically

---

## Arima CLI (Windows)

| Command | Description |
|---------|-------------|
| `arima` | Start server, auto-build if needed, open browser |
| `arima start --bg` | Start in background |
| `arima stop` | Stop the server |
| `arima status` | Show running state |
| `arima build` | Build JAR |
| `arima rebuild` | Force clean rebuild |
| `arima open` | Open browser |
| `arima logs` | Tail background logs |
| `arima help` | Show help |

---

## IDE Setup

### IntelliJ IDEA

Add JVM args to run configuration:
```
--add-opens=jdk.jshell/jdk.jshell=ALL-UNNAMED
--add-opens=java.base/java.lang=ALL-UNNAMED
--add-exports=jdk.jshell/jdk.jshell=ALL-UNNAMED
```

### VS Code

Add to `.vscode/launch.json`:
```json
{
  "vmArgs": "--add-opens=jdk.jshell/jdk.jshell=ALL-UNNAMED --add-opens=java.base/java.lang=ALL-UNNAMED --add-exports=jdk.jshell/jdk.jshell=ALL-UNNAMED"
}
```

---

## Troubleshooting

### "JShell not found" / InaccessibleObjectException
- Ensure you're running with a JDK (`javac -version`)
- Include all three JVM `--add-opens` and `--add-exports` flags

### Port 8585 is already in use
```bash
java ... -jar arima-notebooks.jar --server.port=8586
```

### WebSocket connection failed
- Check browser console (F12) for STOMP errors
- Ensure no proxy is intercepting WebSocket connections

### Package download fails
- Check internet connectivity
- Verify the coordinate format: `groupId:artifactId:version`

### AI not responding
- Ensure Claude CLI is installed: [claude.ai/code](https://claude.ai/code)
- Run `claude auth` in a terminal to sign in
- Check Settings tab → Server Status: Claude CLI should show ✓ Found
</script>

# Arima Notebooks — REST API Reference

Base URL: `http://localhost:8585/api`

All requests and responses use JSON.

---

## Notebooks

### List Notebooks
```
GET /api/notebooks
```
Returns metadata for all notebooks.

### Get Notebook
```
GET /api/notebooks/{id}
```
Returns the full notebook including all cells.

### Create Notebook
```
POST /api/notebooks
```
Body: `{ "name": "My New Notebook" }`

### Save Notebook
```
PUT /api/notebooks/{id}
```
Body: Full notebook JSON.

# Arima Notebooks — Architecture

## Overview

Arima Notebooks is a **single-server Java application** that serves a web UI and exposes REST/WebSocket APIs for interactive Java code execution. There is no separate frontend build process — the browser loads static HTML/CSS/JS directly from Spring Boot's resource handler.

```
Browser                          Arima Server (Spring Boot)
────────                         ─────────────────────────
  HTTP GET /            ──────▶  Static Resource Handler
  REST /api/*           ──────▶  Spring MVC Controllers
  WebSocket /ws         ══════▶  WebSocket (STOMP)
  AI (Claude CLI)               claude --print (local subprocess)
```

---

## Component Architecture

### Backend (Java 21 + Spring Boot 3.2)

```
com.barista/
├── BaristaApplication          # Spring Boot entry point
├── config/
│   ├── WebSocketConfig       # STOMP endpoint configuration
│   └── CorsConfig            # Cross-origin policy
├── model/
│   ├── Notebook, Cell, CellType
│   ├── PackageInfo, BaristaSettings, ExecutionResult
├── shell/
│   ├── JShellManager         # Manages JShell sessions
│   └── ShellSession          # Single JShell instance
├── service/
│   ├── NotebookService       # CRUD for .vnb files
│   ├── PackageService        # Maven Central download
│   ├── JavaCompilerService   # javax.tools compile + run
│   ├── NodeJsExecutionService# Node.js subprocess
│   ├── OrchestrationService  # Dependency graph, topological sort
│   ├── ClaudeService         # Claude CLI integration (local only)
│   └── SettingsService
└── controller/
    ├── NotebookController    # /api/notebooks/*
    ├── ShellController       # /api/shell/*
    ├── PackageController     # /api/packages/*
    ├── LLMController         # /api/llm/*
    └── SettingsController    # /api/settings/*
```

### Frontend (Vanilla JS — no build step)

```
static/
├── index.html           # Single-page app shell
├── css/arima.css        # All styles
└── js/
    ├── app.js           # Global init, tab nav, WebSocket
    ├── notebook.js      # Notebook editor, cell management
    ├── console-tab.js   # Interactive console
    ├── packages.js      # Package manager UI
    ├── settings.js      # Settings form
    ├── ai-assistant.js  # Claude AI panel
    ├── orchestration.js # Pipeline dep-badge rendering
    └── docs.js          # In-app documentation overlay
```

---

## Dual Execution Mode

Each CODE cell has a `mode` field: `"jshell"` (default), `"java"`, or `"nodejs"`.

### JShell Mode
- Uses `ShellSession.execute()` → `jshell.eval()`
- State shared across all cells in the same notebook session
- Variables, methods, imports persist across cell boundaries

### Java Mode
- `JavaCompilerService.compile(source)` → subprocess run
- Each cell compiled as standalone `public class Main { ... }`
- No shared state between cells

### Node.js Mode
- `NodeJsExecutionService` runs JavaScript via `node` subprocess
- `arima` helper object available (`barista.table()`, `barista.html()`, etc.)

---

## Claude AI Integration

All AI calls go exclusively through the local `claude` CLI:

```
LLMController → ClaudeService.chat() → ProcessBuilder(claudeExe, "--print")
                                        stdin: system prompt + conversation
                                        stdout: Claude's response
```

No direct HTTP calls to Anthropic's API. This avoids API rate limits, content-filter policy errors, and API credit consumption. Requires `claude auth` to be run once.

---

## Pipeline / Orchestration

`OrchestrationService` implements a full dependency graph engine:

- **Topological sort**: Kahn's algorithm for execution order
- **Cycle detection**: DFS with back-edge detection
- **Transitive closure**: `execute-with-deps` runs all transitive ancestors first

---

## Data Science Stack

| Library | Purpose | Rendering |
|---------|---------|-----------|
| **XChart 3.8.6** | Charts (XY, bar, pie) | PNG via `BARISTA_IMG:base64` sentinel |
| **Commons Math 3.6.1** | Statistics, regression | Text output |
| **Tablesaw 0.43.1** | DataFrame | HTML via `BARISTA_HTML:` sentinel |
| **OpenCSV 5.9** | CSV parsing | Text output |

---

## WebSocket Protocol

| Direction | Destination | Purpose |
|-----------|-------------|---------|
| Client → Server | `/app/shell/{sessionId}` | Execute code |
| Server → Client | `/topic/shell/{sessionId}` | Execution output |

---

## Security Considerations

- **Local only**: No authentication is implemented. Expose only on localhost.
- **Code execution**: JShell and `JavaCompilerService` run with the same JVM permissions as the server.
- **CORS**: Allowed from any origin for local development.
</script>

<script>
const DOCS = {
  readme:       document.getElementById('src-readme'),
  changelog:    document.getElementById('src-changelog'),
  contributing: document.getElementById('src-contributing'),
  maintainer:   document.getElementById('src-maintainer'),
  usage:        document.getElementById('src-usage'),
  setup:        document.getElementById('src-setup'),
  api:          document.getElementById('src-api'),
  architecture: document.getElementById('src-architecture'),
};

const content = document.getElementById('content');
let activeBtn = null;

function showDoc(key) {
  const src = DOCS[key];
  if (!src) return;
  const md = src.textContent;
  content.innerHTML = marked.parse(md);
  content.scrollTop = 0;

  if (activeBtn) activeBtn.classList.remove('active');
  activeBtn = document.querySelector(`.nav-item[data-doc="${key}"]`);
  if (activeBtn) activeBtn.classList.add('active');

  // Update page title
  const h1 = content.querySelector('h1');
  document.title = 'Arima — ' + (h1 ? h1.textContent : key);
}

// Wire up nav buttons
document.querySelectorAll('.nav-item[data-doc]').forEach(btn => {
  btn.addEventListener('click', () => showDoc(btn.dataset.doc));
});

// Handle hash-based routing
function routeFromHash() {
  const hash = location.hash.replace('#', '');
  if (hash && DOCS[hash]) showDoc(hash);
}

window.addEventListener('hashchange', routeFromHash);

// Load on startup
if (location.hash) {
  routeFromHash();
} else {
  showDoc('readme');
}
</script>
