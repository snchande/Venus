# Venus Notebooks Configuration
# ================================

# Build info (injected by Maven at build time via resource filtering — see pom.xml)
venus.version=@project.version@
venus.build.timestamp=@maven.build.timestamp@

# Server
server.port=8585
spring.application.name=venus-notebooks

# Venus app directories
venus.notebooks.dir=notebooks
venus.data.dir=data

# Auth mode: "local" (default, uses OS username, no login required)
#            "oauth" (requires OAuth2 provider credentials in data/oauth-config.json)
venus.auth.mode=local

# Static resource serving (the web UI)
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**

# Jackson JSON settings
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# WebSocket settings
spring.websocket.message-size-limit=524288
spring.websocket.send-time-limit=20000
spring.websocket.send-buffer-size-limit=524288

# Logging
logging.level.com.venus=INFO
logging.level.org.springframework.web.socket=WARN
logging.level.org.springframework.messaging=WARN

# Increase max request size for large notebook uploads
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Graceful shutdown — drain in-flight requests before stopping
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=15s

# Actuator — expose health + shutdown endpoint only
management.endpoints.web.exposure.include=health,shutdown
management.endpoint.shutdown.enabled=true
management.endpoint.health.show-details=always
# Actuator shares the main port (avoids port conflict on restart)
# management.server.port=8586
